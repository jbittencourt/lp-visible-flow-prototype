<!DOCTYPE html>
<html lang="pt_BR">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0"/>
  <title>Tangible Time</title>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="css/materialize.css" type="text/css" rel="stylesheet" media="screen,projection"/>
  <link href="css/style.css" type="text/css" rel="stylesheet" media="screen,projection"/>

  <script src="js/jquery-2.1.4.min.js"></script>
  <script src="js/materialize.min.js"></script>
  <script src="js/JS-Interpreter/acorn_interpreter.js"></script>
  <script src="js/microworld.js"></script>
  <script src="js/microworld_procedural_bindings.js"></script>

  <script type="module" src="js/main.js"></script>
</head>
<body>

  <div id="interfaceContainer">

    <nav id="mainMenu" class="light-blue lighten-1" role="navigation">
      <div class="nav-wrapper">
        <ul class="left hide-on-med-and-down">
          <li><a href="#" id="save_button"><i class="material-icons left">publish</i> Salvar</a></li>
          <li><a href="#" id="load_button"><i class="material-icons left">cloud_download</i>Carregar</a></li>
        </ul>
      </div>
    </nav>

    <div class="row" id="builderContainer">
      <div class="col s5">
          <div class="row">
              <div class="col s12">
                <div id="stageFrameHeader"></div>
                <div id="stageFrame"></div>
              </div>
          </div>

          <div class="row">
              <div class="col s4">
                <div id="stageControl">
                  <a class="btn-floating btn-large waves-effect waves-light red" id="runButton"><i class="material-icons">play_arrow</i></a>
                  <a class="btn-floating waves-effect waves-light green" id="stepButton"><i class="material-icons">skip_next</i></a>
                </div>
              </div>
              <div class="col s8">
                <div id="stepsText">0 passos</div>
                <form action="#">
                  <p class="range-field">
                    <input type="range" id="programTimeSlider" min="0" max="100" />
                  </p>
                </form>
              </div>
          </div>

          <div class="row">
              <div class="col s2"></div>
              <div class="col s10">
                <form action="#">
                    <div class="switch">
                      Mostra passos:
                      <label>
                        Desligado<input id="isTimeVisible" type="checkbox">
                        <span class="lever"></span>Ligado
                      </label>
                    </div>
                </form>
              </div>
          </div>

      </div>

      <div class="col s7" id="blocklyCol">
           <div id="blocklyDivHeader"></div>
           <div id="blocklyDiv"></div>
      </div>

    </div>

  </div>

  <!-- Save project modal  -->
  <div id="save_modal" class="modal modal-fixed-footer">
    <div class="modal-content">
      <h4>Salvar Micromundo</h4>
      <p>
        <form action="#">
          <input placeholder="Meu Micromundo" id="microworld_name" type="text" class="validate">
          <label for="microworld_name">Nome do Projeto</label>
          <input placeholder="Seu nome" id="microworld_author" type="text" class="validate">
          <label for="microworld_author">Autor</label>
        </form>
      </p>
    </div>
    <div class="modal-footer">
      <a href="#!" class="modal-action modal-close waves-effect waves-green btn-flat" id="save_modal_save">Salvar</a>
    </div>
  </div>

  <div id="load_modal" class="modal bottom-sheet">
    <div class="modal-content">
      <h4>Ler um Micromundo</h4>
      <p>Ler um micromundo salvo nesse computador</p>
       <ul class="collection" id="microworlds_list"></ul>
    </div>
    <div class="modal-footer">
      <a href="#!" class="modal-action modal-close waves-effect waves-green btn-flat" id="load_modal_button">Ler</a>
    </div>
  </div>

</body>
</html>
